name: "CI & Deploy"

permissions:
    contents: read

on:
    push:
        branches: [ main ]
        paths-ignore:
            - "**.md"
            - ".github/**"
    
    workflow_dispatch:

    repository_dispatch:
        types: [fetch-exchange-rates]

jobs:
    ci-and-deploy:
        runs-on: ubuntu-slim
        
        strategy:
            matrix:
                node: [ 22 ]
        
        steps:
            -   name: "📥 Checkout"
                uses: actions/checkout@v4.2.2
                with:
                    fetch-depth: 1

            -   name: "🔧 Setup Node.js"
                uses: actions/setup-node@v4.4.0
                with:
                    node-version: ${{ matrix.node }}
                    cache: "npm"

            -   name: "📦 Install Dependencies"
                run: npm ci
                shell: bash

            -   name: "✅ Lint"
                run: npm run lint
                shell: bash

            -   name: "🧪 Run Unit Tests"
                run: npm run test
                shell: bash

            -   name: "🏗 Build"
                run: npm run generate
                shell: bash

            -   name: "🚀 Deploy to Firebase"
                uses: w9jds/firebase-action@v14.10.1
                with:
                    args: deploy --only hosting
                env:
                    FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
